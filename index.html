<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展示ガイド</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #222; }

  #header { line-height: 0; background: #1a9ea0; padding: 20px; }
  #header img { width: 70%; display: block; margin: 0 auto; }
  #header-band { background: #1a9ea0; height: 10px; }

  #list-view { display: block; }
  #detail-view { display: none; }

  ul { list-style: none; background: #fff; margin: 12px; border-radius: 8px; overflow: hidden; }
  li a {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
    text-decoration: none;
    color: #222;
    font-size: 16px;
    gap: 12px;
  }
  li:last-child a { border-bottom: none; }
  li a:active { background: #f0f0f0; }
  .num {
    font-size: 14px;
    color: #888;
    min-width: 20px;
  }
  .title-text { flex: 1; }

  #detail-view { background: #fff; min-height: 100vh; }
  #detail-header {
    background: #1a9ea0;
    padding: 16px 20px;
  }
  #detail-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
  }
  #detail-body { padding: 24px 20px; }
  #detail-body p {
    font-size: 15px;
    line-height: 1.8;
    color: #333;
  }
  #back-btn {
    display: block;
    margin: 32px 20px 20px;
    padding: 12px;
    text-align: center;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    color: #555;
    background: none;
    width: calc(100% - 40px);
    cursor: pointer;
  }
  #back-btn:active { background: #f0f0f0; }
</style>
</head>
<body>

<div id="list-view">
  <div id="header">
    <img src="header.png" alt="千年先の風景 人智を超えた設計と挑戦">
  </div>
  <div id="header-band"></div>
  <ul id="work-list"></ul>
</div>

<div id="detail-view">
  <div id="detail-header">
    <h2 id="detail-title"></h2>
  </div>
  <div id="detail-body">
    <p id="detail-text"></p>
  </div>
  <button id="back-btn" onclick="showList()">← 作品一覧に戻る</button>
</div>

<script>
const works = [
  { num: 1,  title: "野心作",           text: "（テキスト未入稿）" },
  { num: 2,  title: "噴火口",           text: "（テキスト未入稿）" },
  { num: 3,  title: "湖",               text: "（テキスト未入稿）" },
  { num: 4,  title: "宴会場",           text: "（テキスト未入稿）" },
  { num: 5,  title: "宴会場の東屋",     text: "（テキスト未入稿）" },
  { num: 6,  title: "運動場",           text: "（テキスト未入稿）" },
  { num: 7,  title: "芝生",             text: "（テキスト未入稿）" },
  { num: 8,  title: "神様の滝",         text: "（テキスト未入稿）" },
  { num: 9,  title: "ラクダ岩",         text: "（テキスト未入稿）" },
  { num: 10, title: "自画像岩",         text: "（テキスト未入稿）" },
  { num: 11, title: "散策路",           text: "（テキスト未入稿）" },
];

const list = document.getElementById('work-list');
works.forEach(w => {
  const li = document.createElement('li');
  li.innerHTML = `<a href="#" onclick="showDetail(${w.num - 1}); return false;"><span class="num">${w.num}</span><span class="title-text">${w.title}</span></a>`;
  list.appendChild(li);
});

function showDetail(i) {
  const w = works[i];
  document.getElementById('detail-title').textContent = w.num + '　' + w.title;
  document.getElementById('detail-text').textContent = w.text;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
