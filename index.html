    title: "野心作",
    text: `全長240メートル、高さ40メートルを誇る「野心作」は、月明洞を代表する岩の造景作品です。野心作という名には「神の自負心を表す」という意味が込められており、造景全体は神の権威を象徴する王座をモチーフに造られました。下段は座面のように広く平らに、上段は背もたれのように巨大な岩がそびえ立ち、見る者を圧倒する景観を生み出しています。しかし、その道のりは決して易しくなく、積み上げた岩が何度も崩れ落ちる困難に直面しながらも、幾度となく挑戦を重ねて完成へと至りました。一つとして同じ形のない自然石を、それぞれ個性を持つ人のように見立てて積み上げられたこの造景の中央には、「命を愛しなさい」と刻まれた石が据えられています。`,
    vimeoId: "", vimeoPad: "", vimeoTitle: ""
  },
];

const list = document.getElementById('work-list');
works.forEach((w, i) => {
  const li = document.createElement('li');
  const numHtml = w.num !== null ? `<span class="num">${w.num}</span>` : `<span class="num"></span>`;
  const noNum = w.num === null ? ' class="no-num"' : '';
  li.innerHTML = `<a href="#"${noNum} onclick="showDetail(${i}); return false;">${numHtml}<span class="title-text">${w.title}</span></a>`;
  list.appendChild(li);
});

function showDetail(i) {
  const w = works[i];
  const titleEl = document.getElementById('detail-title-text');
  if (w.hideTitle) {
    titleEl.style.display = 'none';
  } else {
    titleEl.style.display = '';
    const titlePrefix = w.num !== null ? `<span id="detail-num">${w.num}</span>　` : '';
    titleEl.innerHTML = titlePrefix + w.title;
  }
  const textEl = document.getElementById('detail-text');
  textEl.textContent = w.text;
  textEl.style.fontFamily = w.mincho ? "'Shippori Mincho', serif" : '';

  const vimeoEl = document.getElementById('detail-vimeo');
  if (w.vimeoId) {
    vimeoEl.innerHTML = `<div style="padding:${w.vimeoPad} 0 0 0;position:relative;"><iframe src="https://player.vimeo.com/video/${w.vimeoId}?badge=0&autopause=0&player_id=0&app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="${w.vimeoTitle}"></iframe></div>`;
    if (!document.querySelector('script[src="https://player.vimeo.com/api/player.js"]')) {
      const s = document.createElement('script');
      s.src = 'https://player.vimeo.com/api/player.js';
      document.body.appendChild(s);
    }
  } else {
    vimeoEl.innerHTML = '<div class="vimeo-placeholder"></div>';
  }

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.currentIndex = i;

  const prev = works[i - 1];
  const next = works[i + 1];
  const prevBtn = document.getElementById('nav-prev-btn');
  const nextBtn = document.getElementById('nav-next-btn');
  if (prev) {
    prevBtn.style.visibility = 'visible';
    const prevPrefix = prev.num !== null ? prev.num + '　' : '';
    document.getElementById('nav-prev-title').textContent = prevPrefix + prev.title;
  } else {
    prevBtn.style.visibility = 'hidden';
  }
  if (next) {
    nextBtn.style.visibility = 'visible';
    const nextPrefix = next.num !== null ? next.num + '　' : '';
    document.getElementById('nav-next-title').textContent = nextPrefix + next.title;
  } else {
    nextBtn.style.visibility = 'hidden';
  }

  window.scrollTo(0, 0);
}

function movePage(dir) {
  const next = window.currentIndex + dir;
  if (next >= 0 && next < works.length) showDetail(next);
}

function setFont(size) {
  document.body.classList.toggle('large', size === 'large');
  document.getElementById('btn-small').classList.toggle('active', size === 'small');
  document.getElementById('btn-large').classList.toggle('active', size === 'large');
}

function showList() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
