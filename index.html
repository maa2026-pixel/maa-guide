<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展示ガイド</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #222; }
  #header { line-height: 0; background: #1a9ea0; padding: 23px 20px 17px; }
  #header img { width: 80%; display: block; margin: 0 auto; }
  #header-band { background: #1a9ea0; height: 10px; }
  #list-view { display: block; }
  #detail-view { display: none; }
  ul { list-style: none; background: #fff; margin: 12px; border-radius: 8px; overflow: hidden; }
  li a {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
    text-decoration: none;
    color: #222;
    font-size: 16px;
    gap: 12px;
  }
  li:last-child a { border-bottom: none; }
  li a:active { background: #f0f0f0; }
  .num {
    font-size: 14px;
    color: #888;
    min-width: 24px;
  }
  .title-text { flex: 1; }
  #detail-view { background: #fff; min-height: 100vh; }
  #detail-header {
    background: #1a9ea0;
    padding: 16px 20px;
  }
  #detail-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
  }
  #detail-body { padding: 24px 20px; }
  #detail-body p {
    font-size: 15px;
    line-height: 1.8;
    color: #333;
    white-space: pre-wrap;
  }
  .vimeo-wrap {
    margin-bottom: 24px;
  }
  .vimeo-wrap iframe {
    width: 100%;
    border-radius: 6px;
    display: block;
  }
  .vimeo-placeholder {
    width: 100%;
    height: 200px;
    background: #ddd;
    border-radius: 6px;
  }
  #back-btn {
    display: block;
    margin: 32px 20px 20px;
    padding: 12px;
    text-align: center;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    color: #555;
    background: none;
    width: calc(100% - 40px);
    cursor: pointer;
  }
  #back-btn:active { background: #f0f0f0; }
  #font-toggle {
    display: flex;
    justify-content: flex-end;
    padding: 10px 20px 0;
    gap: 8px;
  }
  #font-toggle button {
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    color: #555;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 13px;
  }
  #font-toggle button.active {
    background: #1a9ea0;
    color: #fff;
    border-color: #1a9ea0;
  }
  body.large #detail-body p { font-size: 19px; }
</style>
</head>
<body>
<div id="list-view">
  <div id="header">
    <img src="header.png" alt="千年先の風景 人智を超えた設計と挑戦">
  </div>
  <div id="header-band"></div>
  <ul id="work-list"></ul>
</div>
<div id="detail-view">
  <div id="detail-header">
    <h2 id="detail-title"></h2>
  </div>
  <div id="font-toggle">
    <button id="btn-small" class="active" onclick="setFont('small')">小</button>
    <button id="btn-large" onclick="setFont('large')">大</button>
  </div>
  <div id="detail-body">
    <div id="detail-vimeo" class="vimeo-wrap"></div>
    <p id="detail-text"></p>
  </div>
  <button id="back-btn" onclick="showList()">← 一覧に戻る</button>
</div>
<script>
const works = [
  {
    num: null,
    title: "展示会コンセプト",
    text: `「千年先の風景 ―人智を超えた設計と挑戦」
もし、神がひとつの土地を選び、
そこに風景を刻むとしたら――

人に忘れられた狭い谷。
ぬかるむ畑。急な斜面。

かつては価値がないと
捨て去られた場所。
ここは韓国・月明洞。

しかし――
理解を超えた構想が与えられた。
――シャベル1つから
前代未聞の挑戦が始まる。

谷間は、岩壁の滝に
田畑は、広大な湖に
斜面は、祈りの園に

個々の要素は、役割を帯び
互いに結びつき
欠かすことのできない存在へと
変えられる。

壮大な営みは、やがて――
毎年、百万人が訪れる
理想郷となって
木々と岩も、その喜びを語る。

机上で起こり得ないシナリオ。
人の意図を超えた秩序と調和。

それは設計なのか。
それとも、導きなのか。
この風景は、
千年という時間の途中にある。

――完成を知る者は、まだ誰もいない。`,
    vimeo: ""
  },
  {
    num: 1,
    title: "月明洞の概要",
    text: `かつては水もなく「蛙も逃げ出す」とまで言われた、荒れた寂しい山奥でした。そこが、シャベル一つから始めた30年以上に及ぶ開発によって、世界中から年間100万人が集まる理想郷になりました。元の地形を活かして開発したため、自然な秩序と調和が美しく、神秘的で、勇壮な自然聖殿として建築されました。千年を見据えて自然石で積まれた岩の造景は5度の崩落を経て6度目に完成しましたが、計り知れない情熱と執念によってついに実現しました。月明洞の全体の広さはおよそ東京ドーム35個分に相当します。`,
    vimeo: ""
  },
  {
    num: 2,
    title: "月明洞の地形",
    text: `月明洞地域は、朝鮮半島の最高峰である白頭山から背骨のように伸びている太白山脈の流れの先端に位置しています。月明洞を中心に、周囲にある山脈がちょうど花びらのように幾層にも及んで取り囲んでいます。東は日が登るインデ山、西は日の沈むテドゥン山に挟まれており、月明洞を取り囲む8キロメートル四方の山脈の地形が龍、鷲、人、花などの形象を成しています。変化に富んだ稜線が様々な造形美を織りなしています。`,
    vimeo: ""
  },
  {
    num: 3,
    title: "噴火口",
    text: `月明洞は、中央の広場を中心に「楕円形の噴火口」の形をしています。一般的に噴火口は底が深く、入り口もないため、遠くから鑑賞するのみで、人が中に入る場所として開発することはできません。しかし月明洞は「入り口のある噴火口」なので開発ができました。東側の稜線から西側の稜線までが500メートル、南側から北側までの稜線が300メートルです。この寸法は自然界で最も安定的で美しいとされる「黄金比率」に合致しています。また、大きすぎず小さすぎない適度な広さを保っています。地形全体がまるで芸術作品のようです。`,
    vimeo: ""
  },
  {
    num: 4,
    title: "月明洞の様子",
    text: `この場所は1970年代まで電気さえも通っておらず、月が明るい村と書いてタルバッコルと呼ばれるほど寂しい山奥でした。しかし、開発を30年以上続け、今では年間100万人が訪問する世界的な名所となりました。芝生は2万人、岩の造景や運動場まで含めると全体で3〜4万人が収容できます。人と岩々の大きさを比較してスケールの大きさを感じることができます。`,
    vimeo: ""
  },
  {
    num: 5,
    title: "月明湖",
    text: `かつてこの場所は水が少なく雨水を溜めて稲を育てる田んぼでしたが、今は豊かな水を湛える広大な湖となりました。静穏な姿の湖とその中に佇む趣深い八角亭が調和して幻想的です。湖の奥行きで最も長いところは約70〜80mあります。溜まっている水のように見えますが、山の上から流れてくる全ての水が、湖を通って流れています。ちょうど部屋の中に水を汲んでおいたように月明洞の湿度調節の役割を果たしています。夏は人々が童心に帰って水遊びできる1000人規模の野外プールに、冬は氷が張ってスケートリンクにもなり、船を浮かべたり、雪が積もる風景を見る時は神聖な静寂さが心を清らかにします。`,
    vimeo: ""
  },
  {
    num: 6,
    title: "開発後の姿",
    text: `月明洞の全体の形は「楕円形の噴火口」の形をし、大きすぎず小さすぎない適度な広さです。噴火口の内部へと続く入り口があることが特徴的です。東側の山の稜線から西側の山の稜線までが500メートル、南側から北側までが300メートルという寸法は、自然界で最も安定的で美しいとされる「黄金比率」に合致しています。
東は日が登るインデ山、西は日の沈むテドゥン山に挟まれており、月明洞を取り囲む8キロメートル四方の山脈の地形が龍、鷲、人、花などの形象を成しています。建物の聖殿と芝生の自然聖殿、岩の造景としては野心作と宴会場、神様の滝と聖霊の滝のように互いが対になって配置されています。`,
    vimeo: ""
  },
  {
    num: 7,
    title: "開発前の姿",
    text: `開発前のこの場所は木も岩もなく狭い谷間に小さな畑がある寂しい村でした。道も悪く、土地は荒れ放題で、ジャングルのように草木が生い茂り、傾斜だらけで平地も少ない場所でした。ノミやシラミ、蚊も多く、地獄のような苦しみに耐える生活でした。水が全く出ない地域であったため蛙も逃げ出す場所と言われたほどです。山に囲まれているので狭く息苦しく、住む人みんなここから出ていくことだけが望みでした。`,
    vimeo: ""
  },
  {
    num: 8,
    title: "聖霊道",
    text: `月明洞の東西南北に伸びる道のうち、西側の道が「聖霊道」です。アスファルト道のS字ラインの美しさ、西側に沈む夕日が大変美しく見える道の特徴を踏まえ、聖書に登場する天母・聖霊を象徴する道としてこのように名付けられました。以前あった道は、幅も狭く直線的で傾斜の激しい舗装されてない山道でしたが、地形に合わせてS字カーブを描くゆるやかな傾斜の道に開発しました。初めは砂利道で作ったところ雨に流されてしまい維持管理が難しく、最終的にアスファルトで舗装し、利便性も増すようになりました。この道を通って深い谷を緩やかに下ると、谷を吹き抜ける風が心地よく、視線の先にはテドゥン山の勇壮な岩の絶壁を仰ぐことができます。`,
    vimeo: ""
  },
  {
    num: 9,
    title: "聖霊の滝と東屋",
    text: `聖霊の滝は、山の小さな谷の地形を生かして作られた壮大な岩と松の造景です。高さ23mにもなる岩の造景のあちこちに松の巨木が植えられており、大きいものは幹の太さが直径100㎝を超えます。
左右を巨大な岩に囲まれるように設計された滝つぼは22mの奥行きがあるプールとなっています。全体の形は滝の左右に柔らかい曲線を描いており、聖書に登場する天母・聖霊を象徴する滝として、女性らしさが感じられます。この滝は、神様の滝の対として構想されました。岩の造景の中を歩く絶壁の道を通って滝の上部に上がると、堅牢な木材と石柱で建てられた東屋が佇んでいますが、ここから月明洞やテドゥン山の絶景を一望することが出来ます。聖霊の滝の前では人々が楽しく食事もできるので、別名「宴会場」とも呼ばれています。`,
    vimeo: ""
  },
  {
    num: 10,
    title: "運動場",
    text: `64m×100mの国際規格のサッカーグラウンドです。山に挟まれた狭い谷間を、硬い岩盤を少しずつ削って広げながら完成しました。広すぎず狭すぎず、適当な広さを保っています。毎年、世界中から多くの人々が集まって、平和を目的としたサッカーやバレーボール、テニス、バスケットボールなどの国際大会が開催されています。スポーツをするときに人々が怪我をしないように小さな石1つないように真心を込めて管理されています。この運動場は昔から一度雨が降ると大きな水たまりになって使用することが出来なかったので、中心部分を少し高めた構造にし、土を入れ替えて排水の問題を解決するようになりました。`,
    vimeo: `<div style="padding:56.25% 0 0 0;position:relative;"><iframe src="https://player.vimeo.com/video/1204097425?badge=0&autopause=0&player_id=0&app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="202606月明洞写真展タイトル 10運動場"></iframe></div>`
  },
  {
    num: 11,
    title: "芝生",
    text: `月明洞には広々として美しい芝生があります。2万人を収容することができる広大な芝生の広場は自然の聖殿として構想されました。硬い土でできた急傾斜の斜面に、芝を植え、自生させることは困難を極めましたが、絶え間ない労苦と努力によって実現されました。谷の傾斜に手を加えずにそのまま残したことで、音が奥までよく響く天然の音響ホールとなりました。合唱大会など、国際的な文化芸術イベントの会場としても使用され、雪が積もる冬には、老若男女ともにソリをして楽しむ声で溢れます。広々とした空間と穏やかな景観は訪れる人の心を落ち着かせ、静かに自分自身を見つめ、深い祈りをしたくなるような場所です。`,
    vimeo: ""
  },
  {
    num: 12,
    title: "神様の滝と東屋",
    text: `神様の滝は、水のない小さな谷だった山の急斜面に、20年の構想を経て完成しました。滝の頂には、青い瓦屋根の東屋が凛と佇んでいます。その真下を白水が岩を打ちながら流れ落ちるこの滝は、神様の雄大さを象徴した滝として、男性らしさが感じられます。滝と湖はつながっており調和した一対の大きな作品となっています。滝の雄大さと細やかな湖の近づきやすさの二つ面を備えた作品として構想されました。湖と調和を成すことで、湖はただ静かな湖から生きている湖へと変わりました。`,
    vimeo: ""
  },
  {
    num: 13,
    title: "ラクダ岩",
    text: `500t程になる巨大なラクダの形象をした自然石です。芝生の端に位置し、段ボール箱一つくらいの大きさの岩が地表から飛び出していたので20日余り掘ったところ、その姿が現れました。月明洞は5つの谷から成る星の形をしているため、このラクダ岩は東方の三博士たちがラクダに乗り、星の導きでイエスの誕生を祝ったという聖書の逸話を連想させます。これほど姿が似ている岩がこの場所から掘り出されたことは不思議でなりません。`,
    vimeo: ""
  },
  {
    num: 14,
    title: "自画像岩",
    text: `この岩は人の顔の形象に見えることから「自画像岩」と呼ばれています。目、鼻、口、顔の輪郭がはっきりと見られますが、人が彫刻したのではなく、長い歳月をかけて、雨、風、雷によって自然のままに削られて今の姿になりました。雑木林を掃除していた時、岩にかかっていた草木を取り除いたところ突如この岩が発見されました。人間の身長を超える大きさを持ちながら、静かにたたずむその姿には不思議な存在感があります。まるで自然が自ら描いた彫刻作品のようであり、その神秘的な造形は訪れる人々に驚きと感動を与えます。`,
    vimeo: ""
  },
  {
    num: 15,
    title: "野心作〜316館パノラマ写真",
    text: `（テキスト未定）`,
    vimeo: ""
  },
  {
    num: 16,
    title: "野心作",
    text: `全長240メートル×高さ40メートルの岩の大傑作品です。野心作という名前は「神の自負心を表す」という意味で、神の権威を表す王座の形を表しています。下段部は椅子の座面のように平らで、上段部は椅子の背もたれのように大きな岩がせり立っています。岩が何度も崩れ、5転6起の壮絶な過程を経て立てられました。一つとして同じものがない自然石を個性のある一人の人だと思って積み上げられたこの造景の中央には「命を愛しなさい」という言葉が刻まれた石が置かれています。`,
    vimeo: ""
  },
];

const list = document.getElementById('work-list');
works.forEach((w, i) => {
  const li = document.createElement('li');
  const numHtml = w.num !== null ? `<span class="num">${w.num}</span>` : `<span class="num"></span>`;
  li.innerHTML = `<a href="#" onclick="showDetail(${i}); return false;">${numHtml}<span class="title-text">${w.title}</span></a>`;
  list.appendChild(li);
});

function showDetail(i) {
  const w = works[i];
  const titlePrefix = w.num !== null ? w.num + '　' : '';
  document.getElementById('detail-title').textContent = titlePrefix + w.title;
  document.getElementById('detail-text').textContent = w.text;

  const vimeoEl = document.getElementById('detail-vimeo');
  if (w.vimeo) {
    vimeoEl.innerHTML = w.vimeo;
    if (!document.querySelector('script[src="https://player.vimeo.com/api/player.js"]')) {
      const s = document.createElement('script');
      s.src = 'https://player.vimeo.com/api/player.js';
      document.body.appendChild(s);
    }
  } else {
    vimeoEl.innerHTML = '<div class="vimeo-placeholder"></div>';
  }

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function setFont(size) {
  document.body.classList.toggle('large', size === 'large');
  document.getElementById('btn-small').classList.toggle('active', size === 'small');
  document.getElementById('btn-large').classList.toggle('active', size === 'large');
}

function showList() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
