<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
  }
  body {
    background: #fff;
    color: #3a3a3a;
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    text-align: center;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #3a3a3a;
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.8;
    color: #3a3a3a;
    margin-bottom: 32px;
  }
  .divider {
    width: 32px;
    height: 1px;
    background: #ccc;
    margin: 0 auto 32px;
  }
  p {
    font-size: 13px;
    line-height: 2;
    color: #3a3a3a;
    font-weight: 300;
  }
  p + p {
    margin-top: 8px;
  }
</style>

<body>
  <div class="label">Coming Soon</div>
  <h1>次の展示をお楽しみに</h1>
  <div class="divider"></div>
  <p>近日公開予定です。</p>
  <p>Coming soon. / 即将开放。／即將開放。</p>
</body>
